<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Bilibili 弹幕下载器 Dashboard</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="13" y2="13"/></svg>
                </div>
                <h1>弹幕与视频下载 <span>总库</span></h1>
            </div>
            <div class="header-right">
                <span id="total-count" class="badge">0 个视频</span>
                <button id="refresh-btn" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    刷新
                </button>
            </div>
        </header>

        <main class="main-content">
            <section id="toolbar" class="toolbar hidden">
                <div class="toolbar-group">
                    <label for="sort-select">排序</label>
                    <select id="sort-select" class="toolbar-select">
                        <option value="updateTime">更新弹幕时间</option>
                        <option value="favoriteTime">添加收藏时间</option>
                        <option value="publishTime">视频发布时间</option>
                    </select>
                </div>
                <div class="toolbar-group">
                    <label for="uploader-select">UP主筛选</label>
                    <select id="uploader-select" class="toolbar-select">
                        <option value="__all__">全部UP主</option>
                    </select>
                </div>
                <div class="toolbar-group">
                    <label for="blacklist-select">状态筛选</label>
                    <select id="blacklist-select" class="toolbar-select">
                        <option value="all">全部视频</option>
                        <option value="blacklisted">仅已标记</option>
                        <option value="normal">排除已标记</option>
                    </select>
                </div>
            </section>

            <!-- Loader -->
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <p>正在加载本地数据...</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="state-container hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <p id="error-msg">加载失败，请检查服务是否运行</p>
                <button class="btn btn-outline" onclick="loadVideos()">重试</button>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="state-container hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <p id="empty-msg">暂无下载的视频或弹幕</p>
            </div>

            <!-- Grid -->
            <div id="video-grid" class="video-grid hidden">
                <!-- Cards will be injected here via JS -->
            </div>
        </main>
    </div>

    <!-- Video Player Modal -->
    <div id="player-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closePlayer()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="player-title">视频播放</h3>
                <button class="btn-icon" onclick="closePlayer()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div class="modal-body">
                <video id="html-player" controls preload="auto"></video>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeDetails()"></div>
        <div class="modal-content detail-modal-content">
            <div class="modal-header">
                <div class="detail-modal-header-text">
                    <h3 id="detail-title">分P详情</h3>
                    <p id="detail-subtitle">-</p>
                </div>
                <button class="btn-icon" onclick="closeDetails()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>
            <div id="detail-body" class="detail-modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
